<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>firstline-tool</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 820px;
            margin: 40px auto;
            padding: 0 16px;
        }

        .box {
            border: 1px solid #ddd;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-top: 12px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        input,
        select,
        button {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            box-sizing: border-box;
        }

        button {
            margin-top: 12px;
            cursor: pointer;
        }

        .muted {
            color: #666;
            font-size: 13px;
        }

        .candidates {
            margin-top: 12px;
        }

        .candidate {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            user-select: none;
        }

        .candidate:hover {
            border-color: #333;
        }

        /* A) 선택 표시 강화 */
        .candidate.selected {
            background: #f5f5f5;
            border-color: #000;
            font-weight: 700;
            outline: 2px solid #000;
        }

        .selectedBox {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 12px;
            min-height: 44px;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        @media (max-width: 640px) {
            .row {
                grid-template-columns: 1fr;
            }
        }

        .error {
            color: #b00020;
            font-size: 13px;
            margin-top: 8px;
        }

        .ok {
            color: #0a7a0a;
            font-size: 13px;
            margin-top: 8px;
        }
    </style>
</head>

<body>
    <h1>firstline-tool</h1>
    <p class="muted">
        키워드 3~5개 + 톤을 선택하면 첫 문장 후보 3개가 나오고, 클릭해서 하나를 선택할 수 있어요.
    </p>

    <!-- 입력 영역 -->
    <div class="box">
        <div class="row">
            <div>
                <label for="keywordsInput">키워드 (쉼표로 3~5개)</label>
                <input id="keywordsInput" placeholder="예: 외로움, 가로등, 친구, 벤치, 집" />
                <div class="muted">쉼표(,)로 구분해 주세요. 최소 3개 이상 입력.</div>
            </div>

            <div>
                <label for="toneSelect">톤</label>
                <select id="toneSelect">
                    <option value="담담">담담</option>
                    <option value="건조">건조</option>
                    <option value="감정적">감정적</option>
                    <option value="서사적">서사적</option>
                </select>
                <div class="muted">톤은 문장 구조에 영향을 줍니다.</div>
            </div>
        </div>

        <button id="generateBtn">생성</button>
        <!-- C) 같은 입력으로 다시 생성 -->
        <button id="regenerateBtn" disabled>다시 생성 (같은 입력)</button>

        <div id="status" class="muted"></div>
        <div id="error" class="error"></div>
    </div>

    <!-- 후보 문장 영역 -->
    <div class="box">
        <h2>첫 문장 후보</h2>
        <div id="candidates" class="candidates"></div>
        <div class="muted">후보 문장을 클릭하면 아래에 선택 문장이 고정됩니다.</div>
    </div>

    <!-- 선택 문장 영역 -->
    <div class="box">
        <h2>선택한 문장</h2>
        <div id="selectedLine" class="selectedBox"></div>

        <button id="copyBtn" disabled>선택 문장 복사</button>

        <button id="showLogsBtn" style="margin-top: 8px">
            (개발자용) 선택 로그 콘솔 출력
        </button>

        <div id="copyStatus" class="ok"></div>

        <!-- B) 최근 로그 화면 표시 + 초기화 -->
        <hr style="margin: 16px 0" />
        <h3>최근 선택 로그</h3>
        <div class="muted">브라우저에 저장된 최근 5개 로그를 보여줍니다.</div>

        <div id="logsView" class="selectedBox" style="margin-top: 10px"></div>

        <button id="clearLogsBtn" style="margin-top: 8px">
            로그 초기화(로컬)
        </button>
    </div>

    <script>
        /**
         * =====================================================
         * 1) 화면 요소 가져오기
         * =====================================================
         */
        const keywordsInput = document.getElementById("keywordsInput");
        const toneSelect = document.getElementById("toneSelect");
        const generateBtn = document.getElementById("generateBtn");
        const regenerateBtn = document.getElementById("regenerateBtn");

        const candidatesDiv = document.getElementById("candidates");
        const selectedLineDiv = document.getElementById("selectedLine");

        const copyBtn = document.getElementById("copyBtn");
        const showLogsBtn = document.getElementById("showLogsBtn");
        const logsViewDiv = document.getElementById("logsView");
        const clearLogsBtn = document.getElementById("clearLogsBtn");

        const statusDiv = document.getElementById("status");
        const errorDiv = document.getElementById("error");
        const copyStatusDiv = document.getElementById("copyStatus");

        /**
         * =====================================================
         * 2) 현재 입력/선택 상태 (로그 저장에 필요)
         * =====================================================
         */
        let currentKeywords = [];
        let currentTone = "담담";
        let currentSelectedLine = "";

        /**
         * =====================================================
         * 3) 유틸: 키워드 문자열 → 배열
         * =====================================================
         */
        function parseKeywords(text) {
            return text
                .split(",")
                .map((s) => s.trim())
                .filter((s) => s.length);
        }

        /**
         * =====================================================
         * 4) 서버 요청: 첫 문장 후보 생성
         * =====================================================
         */
        async function fetchFirstLines(keywords, tone) {
            // ✅ 변경: 절대경로 → 상대경로
            const res = await fetch("/api/first-lines", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ keywords, tone }),
            });

            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.details || err.error || "서버 오류");
            }

            return res.json();
        }

        /**
         * =====================================================
         * 5) 서버 결과 텍스트에서 "1. 2. 3." 후보만 추출
         * =====================================================
         */
        function extractLines(resultText) {
            const lines = resultText
                .split("\n")
                .map((l) => l.trim())
                .filter((l) => l.length);

            const onlyCandidates = lines
                .filter((l) => /^[1-3]\.\s/.test(l))
                .map((l) => l.replace(/^[1-3]\.\s/, ""));

            return onlyCandidates;
        }

        /**
         * =====================================================
         * 6) 후보 문장을 카드로 렌더링
         * =====================================================
         */
        function renderCandidates(lines) {
            candidatesDiv.innerHTML = "";

            lines.forEach((line) => {
                const card = document.createElement("div");
                card.className = "candidate";
                card.innerText = line;

                card.addEventListener("click", () => {
                    selectLine(line, card);
                });

                candidatesDiv.appendChild(card);
            });
        }

        /**
         * =====================================================
         * 7) 카드 선택 처리
         * =====================================================
         */
        function selectLine(line, clickedCard) {
            // 기존 선택 해제
            document
                .querySelectorAll(".candidate")
                .forEach((el) => el.classList.remove("selected"));

            // 현재 선택 표시
            clickedCard.classList.add("selected");

            // 선택 문장 표시
            currentSelectedLine = line;
            selectedLineDiv.innerText = line;

            // 복사 버튼 활성화
            copyBtn.disabled = false;

            // 로그 저장
            saveSelectionLog();
        }

        /**
         * =====================================================
         * 8) (B) 최근 로그 화면 표시
         * =====================================================
         */
        function renderRecentLogs() {
            const logs = JSON.parse(localStorage.getItem("selectionLogs") || "[]");
            const recent = logs.slice(-5).reverse();

            if (recent.length === 0) {
                logsViewDiv.innerHTML = "<div class='muted'>아직 로그가 없습니다.</div>";
                return;
            }

            const rows = recent
                .map(
                    (l) => `
            <div style="margin-bottom:10px; padding-bottom:10px; border-bottom:1px dashed #ddd;">
              <div><b>톤</b>: ${l.tone}</div>
              <div><b>키워드</b>: ${l.keywords.join(", ")}</div>
              <div><b>선택</b>: ${l.selectedLine}</div>
              <div class="muted"><b>시간</b>: ${l.timestamp}</div>
            </div>
          `
                )
                .join("");

            logsViewDiv.innerHTML = rows;
        }

        /**
         * =====================================================
         * 9) (D) 서버로 로그 전송 (실패해도 UI는 계속 동작)
         * =====================================================
         */
        async function sendLogToServer(log) {
            try {
                // ✅ 변경: 절대경로 → 상대경로
                await fetch("/api/logs", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(log),
                });
            } catch (e) {
                console.warn("서버 로그 저장 실패:", e);
            }
        }

        /**
         * =====================================================
         * 10) 로그 저장 (로컬 + 서버)
         * =====================================================
         */
        function saveSelectionLog() {
            const log = {
                timestamp: new Date().toISOString(),
                keywords: currentKeywords,
                tone: currentTone,
                selectedLine: currentSelectedLine,
            };

            // 로컬 저장
            const logs = JSON.parse(localStorage.getItem("selectionLogs") || "[]");
            logs.push(log);
            localStorage.setItem("selectionLogs", JSON.stringify(logs));

            // 서버 저장(D)
            sendLogToServer(log);

            // 화면 갱신(B)
            renderRecentLogs();
        }

        /**
         * =====================================================
         * 11) 복사 버튼
         * =====================================================
         */
        copyBtn.addEventListener("click", async () => {
            try {
                await navigator.clipboard.writeText(currentSelectedLine);
                copyStatusDiv.innerText = "복사 완료!";
                setTimeout(() => (copyStatusDiv.innerText = ""), 1200);
            } catch (e) {
                copyStatusDiv.innerText = "복사 실패 (브라우저 권한 확인)";
            }
        });

        /**
         * =====================================================
         * 12) (개발자용) 콘솔 로그 출력
         * =====================================================
         */
        showLogsBtn.addEventListener("click", () => {
            const logs = JSON.parse(localStorage.getItem("selectionLogs") || "[]");
            console.table(logs);
            alert("콘솔(F12)에서 selectionLogs를 확인하세요!");
        });

        /**
         * =====================================================
         * 13) (B) 로컬 로그 초기화
         * =====================================================
         */
        clearLogsBtn.addEventListener("click", () => {
            localStorage.removeItem("selectionLogs");
            renderRecentLogs();
            alert("로컬 로그를 초기화했습니다!");
        });

        /**
         * =====================================================
         * 14) 생성 버튼 (메인 흐름)
         * =====================================================
         */
        generateBtn.addEventListener("click", async () => {
            errorDiv.innerText = "";
            copyStatusDiv.innerText = "";
            statusDiv.innerText = "생성 중...";
            copyBtn.disabled = true;
            selectedLineDiv.innerText = "";
            currentSelectedLine = "";

            // 입력 읽기
            const keywords = parseKeywords(keywordsInput.value);
            const tone = toneSelect.value;

            // 최소 검증
            if (keywords.length < 3) {
                statusDiv.innerText = "";
                errorDiv.innerText = "키워드를 최소 3개 이상 입력해 주세요.";
                return;
            }

            // 현재 상태 저장 (로그에 사용)
            currentKeywords = keywords;
            currentTone = tone;

            try {
                const data = await fetchFirstLines(keywords, tone);
                const lines = extractLines(data.result);

                if (lines.length === 0) throw new Error("후보 문장을 파싱하지 못했습니다.");

                renderCandidates(lines);
                statusDiv.innerText = "후보가 생성되었습니다. 하나를 선택해 보세요.";

                // C) 다시 생성 활성화
                regenerateBtn.disabled = false;
            } catch (err) {
                statusDiv.innerText = "";
                errorDiv.innerText = err.message || "서버 오류";
            }
        });

        /**
         * =====================================================
         * 15) (C) 다시 생성 버튼: 같은 입력으로 재생성
         * =====================================================
         */
        regenerateBtn.addEventListener("click", async () => {
            errorDiv.innerText = "";
            copyStatusDiv.innerText = "";
            statusDiv.innerText = "다시 생성 중...";
            copyBtn.disabled = true;
            selectedLineDiv.innerText = "";
            currentSelectedLine = "";

            if (currentKeywords.length < 3) {
                statusDiv.innerText = "";
                errorDiv.innerText = "먼저 키워드를 입력하고 생성해 주세요.";
                return;
            }

            try {
                const data = await fetchFirstLines(currentKeywords, currentTone);
                const lines = extractLines(data.result);

                if (lines.length === 0) throw new Error("후보 문장을 파싱하지 못했습니다.");

                renderCandidates(lines);
                statusDiv.innerText = "새 후보가 생성되었습니다. 하나를 선택해 보세요.";
            } catch (err) {
                statusDiv.innerText = "";
                errorDiv.innerText = err.message || "서버 오류";
            }
        });

        /**
         * =====================================================
         * 페이지 로드 시, 최근 로그 표시(B)
         * =====================================================
         */
        renderRecentLogs();
    </script>
</body>

</html>
